<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Layout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background-color: rgb(15, 23, 42);
      color: rgb(255, 255, 255);
      padding: 24px 0;
      flex-shrink: 0;
    }

    .sidebar-brand {
      font-size: 20px;
      font-weight: bold;
      padding: 0 24px;
      margin-bottom: 32px;
    }

    .sidebar-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: rgb(148, 163, 184);
      text-decoration: none;
      font-size: 14px;
    }

    .sidebar-link:hover {
      background-color: rgb(30, 41, 59);
      color: rgb(255, 255, 255);
    }

    .sidebar-link-active {
      background-color: rgb(30, 41, 59);
      color: rgb(255, 255, 255);
      border-left: 3px solid rgb(59, 130, 246);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      background-color: rgb(255, 255, 255);
      border-bottom: 1px solid rgb(226, 232, 240);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: rgb(15, 23, 42);
    }

    .topbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: rgb(59, 130, 246);
    }

    .content {
      flex: 1;
      padding: 32px;
      background-color: rgb(248, 250, 252);
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .stat-card {
      background-color: rgb(255, 255, 255);
      border-radius: 8px;
      padding: 24px;
      border: 1px solid rgb(226, 232, 240);
    }

    .stat-label {
      font-size: 14px;
      color: rgb(100, 116, 139);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: rgb(15, 23, 42);
    }

    .sidebar-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: rgb(15, 23, 42);
    }

    @media (max-width: 800px) {
      .sidebar {
        display: none;
      }

      .sidebar-toggle {
        display: block;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      .topbar {
        padding: 0 16px;
      }

      .content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="layout" data-tid="layout">
    <aside class="sidebar" data-tid="sidebar">
      <div class="sidebar-brand" data-tid="sidebar-brand">Dashboard</div>
      <nav class="sidebar-nav" data-tid="sidebar-nav">
        <a class="sidebar-link sidebar-link-active" data-tid="link-overview" href="#">Overview</a>
        <a class="sidebar-link" data-tid="link-analytics" href="#">Analytics</a>
        <a class="sidebar-link" data-tid="link-reports" href="#">Reports</a>
        <a class="sidebar-link" data-tid="link-settings" href="#">Settings</a>
      </nav>
    </aside>

    <div class="main" data-tid="main">
      <header class="topbar" data-tid="topbar">
        <button class="sidebar-toggle" data-tid="sidebar-toggle">&#9776;</button>
        <span class="topbar-title" data-tid="topbar-title">Overview</span>
        <div class="topbar-avatar" data-tid="topbar-avatar"></div>
      </header>

      <main class="content" data-tid="content">
        <div class="content-grid" data-tid="content-grid">
          <div class="stat-card" data-tid="stat-users">
            <div class="stat-label" data-tid="stat-users-label">Total Users</div>
            <div class="stat-value" data-tid="stat-users-value">12,345</div>
          </div>
          <div class="stat-card" data-tid="stat-revenue">
            <div class="stat-label" data-tid="stat-revenue-label">Revenue</div>
            <div class="stat-value" data-tid="stat-revenue-value">$48,290</div>
          </div>
          <div class="stat-card" data-tid="stat-orders">
            <div class="stat-label" data-tid="stat-orders-label">Orders</div>
            <div class="stat-value" data-tid="stat-orders-value">1,024</div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
