<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { padding: 40px; font-family: system-ui; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 900px;
    }

    .grid-item {
      background-color: rgb(241, 245, 249);
      border-radius: 8px;
      padding: 24px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: rgb(51, 65, 85);
    }

    .grid-item-featured {
      grid-column: span 2;
      background-color: rgb(59, 130, 246);
      color: rgb(255, 255, 255);
      height: 200px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
        width: 100%;
      }

      .grid-item-featured {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="grid" data-tid="grid">
    <div class="grid-item grid-item-featured" data-tid="grid-featured">Featured</div>
    <div class="grid-item" data-tid="grid-item-1">Item 1</div>
    <div class="grid-item" data-tid="grid-item-2">Item 2</div>
    <div class="grid-item" data-tid="grid-item-3">Item 3</div>
    <div class="grid-item" data-tid="grid-item-4">Item 4</div>
    <div class="grid-item" data-tid="grid-item-5">Item 5</div>
  </div>
</body>
</html>
