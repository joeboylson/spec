<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; }

    .hero {
      width: 100%;
      height: 600px;
      background-color: rgb(15, 23, 42);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      text-align: center;
      z-index: 2;
      max-width: 700px;
      padding: 0 24px;
    }

    .hero-badge {
      display: inline-block;
      background-color: rgba(59, 130, 246, 0.15);
      color: rgb(96, 165, 250);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .hero-title {
      font-size: 56px;
      font-weight: 800;
      color: rgb(255, 255, 255);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero-subtitle {
      font-size: 20px;
      color: rgb(148, 163, 184);
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .hero-btn {
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .hero-btn-primary {
      background-color: rgb(59, 130, 246);
      color: rgb(255, 255, 255);
    }

    .hero-btn-primary:hover {
      background-color: rgb(37, 99, 235);
    }

    .hero-btn-secondary {
      background-color: transparent;
      color: rgb(255, 255, 255);
      border: 1px solid rgb(71, 85, 105);
    }

    .hero-btn-secondary:hover {
      background-color: rgb(30, 41, 59);
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    @media (max-width: 700px) {
      .hero {
        height: auto;
        padding: 80px 0;
      }

      .hero-title {
        font-size: 36px;
      }

      .hero-subtitle {
        font-size: 16px;
      }

      .hero-actions {
        flex-direction: column;
        align-items: center;
      }

      .hero-btn {
        width: 100%;
        max-width: 280px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <section class="hero" data-tid="hero">
    <div class="hero-glow" data-tid="hero-glow"></div>
    <div class="hero-content" data-tid="hero-content">
      <span class="hero-badge" data-tid="hero-badge">New Release</span>
      <h1 class="hero-title" data-tid="hero-title">Build better design systems</h1>
      <p class="hero-subtitle" data-tid="hero-subtitle">Executable specs that catch layout bugs before your users do.</p>
      <div class="hero-actions" data-tid="hero-actions">
        <button class="hero-btn hero-btn-primary" data-tid="hero-btn-primary">Get Started</button>
        <button class="hero-btn hero-btn-secondary" data-tid="hero-btn-secondary">Documentation</button>
      </div>
    </div>
  </section>
</body>
</html>
