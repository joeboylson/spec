<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; }

    .page-content {
      padding: 40px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background-color: rgb(255, 255, 255);
      border-radius: 12px;
      padding: 32px;
      width: 480px;
      max-width: 90%;
      z-index: 101;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      color: rgb(15, 23, 42);
      margin-bottom: 12px;
    }

    .modal-body {
      font-size: 16px;
      color: rgb(100, 116, 139);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-btn-secondary {
      background-color: rgb(241, 245, 249);
      color: rgb(71, 85, 105);
    }

    .modal-btn-primary {
      background-color: rgb(239, 68, 68);
      color: rgb(255, 255, 255);
    }

    .modal-btn-primary:hover {
      background-color: rgb(220, 38, 38);
    }

    @media (max-width: 500px) {
      .modal {
        width: 100%;
        border-radius: 12px 12px 0 0;
        position: fixed;
        bottom: 0;
        padding: 24px;
      }

      .overlay {
        align-items: flex-end;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .modal-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="page-content" data-tid="page-content">
    <h1>Background Page</h1>
  </div>

  <div class="overlay" data-tid="overlay">
    <div class="modal" data-tid="modal">
      <div class="modal-title" data-tid="modal-title">Delete Account</div>
      <div class="modal-body" data-tid="modal-body">This action cannot be undone. All your data will be permanently removed.</div>
      <div class="modal-actions" data-tid="modal-actions">
        <button class="modal-btn modal-btn-secondary" data-tid="modal-btn-cancel">Cancel</button>
        <button class="modal-btn modal-btn-primary" data-tid="modal-btn-delete">Delete</button>
      </div>
    </div>
  </div>
</body>
</html>
