<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { padding: 40px; font-family: system-ui; }

    .btn-primary {
      background-color: rgb(59, 130, 246);
      color: rgb(255, 255, 255);
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      width: 200px;
      height: 48px;
      border-radius: 6px;
    }

    .btn-primary:hover {
      background-color: rgb(37, 99, 235);
    }

    .btn-primary:focus-visible {
      outline: 2px solid rgb(59, 130, 246);
      outline-offset: 2px;
    }

    @media (max-width: 500px) {
      .btn-primary {
        width: 100%;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <button class="btn-primary" data-tid="btn-primary">Click me</button>
</body>
</html>
